<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Zodiac Cake</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#D6A67D;

font-family:
Arial,
sans-serif;

padding:60px;

}

h1{

text-align:center;

font-size:56px;

color:white;

margin-bottom:15px;

}

p{

text-align:center;

font-size:20px;

color:white;

margin-bottom:60px;

}

.grid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:40px;

max-width:900px;

margin:auto;

}

.card{

background:white;

border-radius:20px;

padding:20px;

transition:.3s;

cursor:pointer;

}

.card:hover{

transform:
translateY(-8px)
scale(1.04);

}

.card img{

width:100%;

display:block;

}

.card h2{

margin-top:20px;

text-align:center;

font-size:22px;

color:#555;

}

</style>

</head>

<body>

<h1>Zodiac Cakes</h1>

<p>Choose your birthday cake.</p>

<div class="grid">

<div class="card">

<img src="https://ivywxt-debug.github.io/zodiac-cake/aquarius-cake.png">

<h2>Aquarius</h2>

</div>

<div class="card">

<img src="https://ivywxt-debug.github.io/zodiac-cake/pisces-cake.png">

<h2>Pisces</h2>

</div>

<div class="card">

<img src="https://ivywxt-debug.github.io/zodiac-cake/virgo-cake.png">

<h2>Virgo</h2>

</div>

<div class="card">

<img src="https://ivywxt-debug.github.io/zodiac-cake/gemini-cake.png">

<h2>Gemini</h2>

</div>

<div class="card">

<img src="https://ivywxt-debug.github.io/zodiac-cake/libra-cake.png">

<h2>Libra</h2>

</div>

<div class="card">

<img src="https://ivywxt-debug.github.io/zodiac-cake/leo-cake.png">

<h2>Leo</h2>

</div>

</div>

</body>

</html>
